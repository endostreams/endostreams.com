<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endostreams Technologies — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1F3A;
    --slate: #4A5568;
    --muted: #8A95A3;
    --rule: #E2E8EF;
    --bg: #FAFAFA;
    --white: #FFFFFF;
    --blue: #1B6EBF;
  }
  html, body { height: 100%; background: var(--bg); color: var(--navy); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; display: flex; flex-direction: column; }

  header {
    padding: 1.8rem 4rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 0.5px solid var(--rule);
    opacity: 0; animation: fadeUp 0.8s ease forwards; animation-delay: 0.1s;
  }

  .logo { display: flex; align-items: center; text-decoration: none; }
  .logo-wordmark { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; text-transform: uppercase; }
  .logo-endo    { color: #111111; }
  .logo-streams { color: var(--blue); }

  .header-tag {
    font-size: 12px; font-weight: 400; color: var(--muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 0.5px solid var(--rule); padding: 5px 12px; border-radius: 20px;
  }

  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 4rem 2rem; text-align: center;
  }

  .content { max-width: 640px; width: 100%; }

  .eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--blue);
    margin-bottom: 2rem;
    opacity: 0; animation: fadeUp 0.8s ease forwards; animation-delay: 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  .eyebrow::before,
  .eyebrow::after { content: ''; display: block; width: 28px; height: 1px; background: var(--blue); flex-shrink: 0; }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3.2rem, 6vw, 5.5rem);
    font-weight: 400; line-height: 1.05; letter-spacing: -0.02em; color: var(--navy);
    opacity: 0; animation: fadeUp 0.9s ease forwards; animation-delay: 0.45s;
  }
  h1 em { font-style: italic; color: var(--blue); }

  footer {
    padding: 1.5rem 4rem;
    border-top: 0.5px solid var(--rule);
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    opacity: 0; animation: fadeUp 0.8s ease forwards; animation-delay: 0.8s;
  }

  .footer-left { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .footer-right { display: flex; align-items: center; gap: 24px; flex-shrink: 0; }

  .status-dot { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); white-space: nowrap; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #22C55E; animation: pulse 2.5s ease-in-out infinite; flex-shrink: 0; }

  .contact-link {
    font-size: 12px; color: var(--slate); text-decoration: none;
    display: flex; align-items: center; gap: 6px; transition: color 0.2s; white-space: nowrap;
  }
  .contact-link:hover { color: var(--blue); }
  .contact-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }
  @keyframes pulse  { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.8);} }

  @media (max-width: 768px) {
    header { padding: 1.4rem 1.5rem; }
    .header-tag { display: none; }
    .logo-wordmark { font-size: 20px; }
    main { padding: 3rem 1.5rem; }
    h1 { font-size: 2.8rem; }
    footer {
      padding: 1.2rem 1.5rem;
      flex-direction: column; align-items: flex-start; gap: 12px;
    }
    .footer-left { white-space: normal; }
    .footer-right { flex-direction: column; align-items: flex-start; gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <a href="#" class="logo">
    <span class="logo-wordmark">
      <span class="logo-endo">ENDO</span><span class="logo-streams">STREAMS</span>
    </span>
  </a>
  <span class="header-tag">Chennai &nbsp;&bull;&nbsp; India</span>
</header>

<main>
  <div class="content">
    <div class="eyebrow">Coming soon</div>
    <h1>Reimagining<br><em>endoscopy</em><br>for India.</h1>
  </div>
</main>

<footer>
  <div class="footer-left">
    Endostreams Technologies Pvt Ltd &nbsp;&bull;&nbsp; Chennai, TN
  </div>
  <div class="footer-right">
    <div class="status-dot"><span class="dot"></span>In development</div>
    <a href="mailto:info@endostreams.com" class="contact-link">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
      info@endostreams.com
    </a>    
  </div>
</footer>

</body>
</html>
